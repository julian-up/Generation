<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparación de Números</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a2e;
            color: #eaeaea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        h2 {
            color: #0f3460;
            background-color: #e94560;
            padding: 5px 15px;
            border-radius: 5px;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        #resultado {
            background-color: #16213e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        #resultado h3 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .numero {
            display: inline-block;
            background-color: #0f3460;
            color: #eaeaea;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .comparacion {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .mayor {
            background-color: #1b4332;
            border: 1px solid #2d6a4f;
            color: #95d5b2;
        }

        .menor {
            background-color: #3d0814;
            border: 1px solid #a4133c;
            color: #ff758f;
        }

        .igual {
            background-color: #1d3557;
            border: 1px solid #457b9d;
            color: #a8dadc;
        }

        .error {
            background-color: #5c0000;
            border: 1px solid #ff0000;
            color: #ffcccc;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <h1>Comparación de Números</h1>
    <h2>Práctica - Lógica de Programación</h2>

    <div id="resultado">
        <h3>Cargando...</h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
